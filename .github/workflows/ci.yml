name: CI — Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Python files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linter
        run: pip install flake8

      - name: Lint DAG
        run: flake8 dags/ data/ --max-line-length=120 --ignore=E501,W503

  validate-dag:
    name: Validate Airflow DAG
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install apache-airflow==2.8.1 boto3 psycopg2-binary

      - name: Check DAG loads without errors
        run: python -c "import dags.weather_pipeline; print('DAG loaded OK')"
        env:
          AIRFLOW__CORE__LOAD_EXAMPLES: "False"
          AIRFLOW_HOME: /tmp/airflow

  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate .env file
        run: |
          cat <<EOF > .env
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          AIRFLOW_UID=50000
          AIRFLOW__CORE__EXECUTOR=LocalExecutor
          AIRFLOW__CORE__FERNET_KEY=${{ secrets.AIRFLOW__CORE__FERNET_KEY }}
          AIRFLOW__WEBSERVER__SECRET_KEY=${{ secrets.AIRFLOW__WEBSERVER__SECRET_KEY }}
          AIRFLOW__CORE__LOAD_EXAMPLES=False
          MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
          DATA_POSTGRES_USER=${{ secrets.DATA_POSTGRES_USER }}
          DATA_POSTGRES_PASSWORD=${{ secrets.DATA_POSTGRES_PASSWORD }}
          DATA_POSTGRES_DB=${{ secrets.DATA_POSTGRES_DB }}
          MB_DB_TYPE=postgres
          MB_DB_HOST=data-postgres
          MB_DB_PORT=5432
          MB_DB_DBNAME=${{ secrets.DATA_POSTGRES_DB }}
          MB_DB_USER=${{ secrets.DATA_POSTGRES_USER }}
          MB_DB_PASS=${{ secrets.DATA_POSTGRES_PASSWORD }}
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker compose config
        run: docker compose config
