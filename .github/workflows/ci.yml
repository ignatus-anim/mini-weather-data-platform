name: CI — Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Python files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linter
        run: pip install flake8

      - name: Lint DAG
        run: flake8 dags/ data/ --max-line-length=120 --ignore=E501,W503

  validate-dag:
    name: Validate Airflow DAG
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install apache-airflow==2.8.1 boto3 psycopg2-binary

      - name: Check DAG loads without errors
        run: python -c "import dags.weather_pipeline; print('DAG loaded OK')"
        env:
          AIRFLOW__CORE__LOAD_EXAMPLES: "False"
          AIRFLOW_HOME: /tmp/airflow

  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Airflow image (smoke test)
        run: |
          docker compose config
          docker compose pull --quiet airflow-webserver
        env:
          POSTGRES_USER: airflow
          POSTGRES_PASSWORD: airflow
          POSTGRES_DB: airflow
          AIRFLOW__CORE__EXECUTOR: LocalExecutor
          AIRFLOW__CORE__FERNET_KEY: 46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY=
          AIRFLOW__WEBSERVER__SECRET_KEY: test_secret
          AIRFLOW__CORE__LOAD_EXAMPLES: "False"
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin123
          DATA_POSTGRES_USER: datauser
          DATA_POSTGRES_PASSWORD: datapassword
          DATA_POSTGRES_DB: salesdb
          MB_DB_TYPE: postgres
          MB_DB_HOST: data-postgres
          MB_DB_PORT: "5432"
          MB_DB_DBNAME: salesdb
          MB_DB_USER: datauser
          MB_DB_PASS: datapassword
          AIRFLOW_UID: "50000"
